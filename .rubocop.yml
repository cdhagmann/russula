require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'bin/**/*'

# Style preferences
Style/Documentation:
  Enabled: false  # Enable once we have comprehensive docs

Style/StringLiterals:
  EnforcedStyle: single_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Layout/LineLength:
  Max: 120
  AllowedPatterns:
    - '\A\s*#'  # Allow long comments

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'Rakefile'

Metrics/MethodLength:
  Max: 15
  Exclude:
    - 'spec/**/*'

# RSpec specific
RSpec/ExampleLength:
  Max: 25

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 4

# Tests describe behaviours (e.g. 'Instruct-Validate-Repair Loop'), not classes
RSpec/DescribeClass:
  Enabled: false

# Existing tests use freeform context strings; not worth churn to enforce
RSpec/ContextWording:
  Enabled: false

# The error-handling integration test uses `end.to raise_error(...) do |error| ... end`
Style/MultilineBlockChain:
  Enabled: false
